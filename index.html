    <style>
        * { font-family: system-ui, -apple-system, "Segoe UI", Arial, sans-serif; box-sizing: border-box; }
        body { background: #f1f5f9; margin: 0; padding: 0; }

        .fade-in { animation: fadeUp 0.3s ease forwards; }
        @keyframes fadeUp {
            from { opacity:0; transform:translateY(10px); }
            to   { opacity:1; transform:translateY(0); }
        }

        /* Semáforo */
        .traffic-light {
            display:flex; flex-direction:column; align-items:center;
            background:#1e293b; border-radius:16px; padding:12px 10px; gap:10px;
            box-shadow:0 4px 20px rgba(0,0,0,0.4); flex-shrink:0;
        }
        .light {
            width:32px; height:32px; border-radius:50%;
            background:#374151; opacity:0.3; transition:all 0.4s;
        }
        .light.on-red    { background:#ef4444; opacity:1; box-shadow:0 0 16px #ef4444,0 0 32px rgba(239,68,68,0.4); }
        .light.on-orange { background:#f97316; opacity:1; box-shadow:0 0 16px #f97316,0 0 32px rgba(249,115,22,0.4); }
        .light.on-yellow { background:#eab308; opacity:1; box-shadow:0 0 16px #eab308,0 0 32px rgba(234,179,8,0.4); }
        .light.on-green  { background:#22c55e; opacity:1; box-shadow:0 0 16px #22c55e,0 0 32px rgba(34,197,94,0.4); }

        /* Slider */
        input[type=range] { accent-color:#e25c1e; width:100%; height:14px; cursor:pointer; }

        /* Botones de perfil */
        .btn-perfil {
            padding:14px 16px; border-radius:12px; border:2px solid #e2e8f0;
            background:white; cursor:pointer; text-align:left; transition:all 0.18s; width:100%;
        }
        .btn-perfil:hover { border-color:#e25c1e; background:#fff7ed; }
        .btn-perfil.active { border-color:#e25c1e; background:#fff7ed; box-shadow:0 0 0 3px #fee2d0; }

        /* Tarjetas de materia */
        .subj-card {
            display:flex; align-items:center; justify-content:space-between;
            padding:12px 14px; border-radius:12px; border:2px solid #e2e8f0;
            background:white; cursor:pointer; transition:all 0.18s; width:100%;
            text-align:left;
        }
        .subj-card:hover { border-color:#fdba74; background:#fffbf8; transform:translateY(-1px); }
        .subj-card.checked { border-color:#f97316; background:#fff7ed; }

        /* Barra de carga */
        .load-track { background:#e2e8f0; height:8px; border-radius:999px; overflow:hidden; margin-top:6px; }
        .load-fill  { height:100%; border-radius:999px; transition:width 0.5s ease; }

        /* Scrollbar */
        .scroll-y { overflow-y:auto; }
        .scroll-y::-webkit-scrollbar { width:5px; }
        .scroll-y::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:10px; }

        /* Cat chip */
        .chip {
            display:inline-block; font-size:10px; font-weight:700; letter-spacing:0.06em;
            text-transform:uppercase; padding:3px 10px; border-radius:999px;
        }

        /* Botón primario */
        .btn-primary {
            background:#e25c1e; color:white; border:none; border-radius:12px;
            padding:12px 24px; font-weight:700; font-size:15px; cursor:pointer;
            display:inline-flex; align-items:center; gap:8px; transition:all 0.18s;
            box-shadow:0 4px 12px rgba(226,92,30,0.3);
        }
        .btn-primary:hover { background:#c94d14; box-shadow:0 6px 18px rgba(226,92,30,0.4); }
        .btn-primary:disabled { opacity:0.4; cursor:not-allowed; box-shadow:none; }

        .btn-secondary {
            background:white; color:#475569; border:2px solid #e2e8f0; border-radius:12px;
            padding:10px 20px; font-weight:600; font-size:14px; cursor:pointer;
            display:inline-flex; align-items:center; gap:6px; transition:all 0.18s;
        }
        .btn-secondary:hover { border-color:#e25c1e; color:#e25c1e; background:#fff7ed; }

        .btn-back {
            background:none; border:none; color:#94a3b8; cursor:pointer;
            display:inline-flex; align-items:center; gap:6px; font-size:14px;
            font-weight:600; padding:0; transition:color 0.15s;
        }
        .btn-back:hover { color:#e25c1e; }

        /* Step bar */
        .step-dot {
            width:24px; height:24px; border-radius:50%; display:flex;
            align-items:center; justify-content:center; font-size:11px;
            font-weight:800; flex-shrink:0;
        }
        .step-line { flex:1; height:2px; }

        /* Grid responsive */
        .grid-2 { display:grid; grid-template-columns:1fr; gap:12px; }
        @media(min-width:640px){ .grid-2 { grid-template-columns:1fr 1fr; } }
        .grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
        .grid-metrics { display:grid; grid-template-columns:1fr 1fr; gap:16px; }

        @media print {
            .no-print { display:none !important; }
            body { background:white; padding:0; }
        }
    </style>

// ── LÓGICA SEMÁFORO ───────────────────────────────────────────
function getRisk(totalH, availH) {
  if (totalH === 0) return null;
  if (totalH > 35) return {
    red:true, orange:false, yellow:false, green:false,
    label:"⛔ Matrícula Excesiva",
    bg:"#dc2626", border:"#dc2626", textColor:"white",
    badgeBg:"#fee2e2", badgeColor:"#991b1b",
    msg:`Has seleccionado ${totalH}h/semana, equivalente a una jornada laboral completa. El riesgo de abandono es muy elevado.`,
    tip:"Considera fraccionar la matrícula en dos cursos académicos."
  };
  const r = totalH / availH;
  if (r > 1) return {
    red:false, orange:true, yellow:false, green:false,
    label:"🔴 Riesgo Alto",
    bg:"#ea580c", border:"#ea580c", textColor:"white",
    badgeBg:"#ffedd5", badgeColor:"#9a3412",
    msg:`Necesitas ${totalH}h semanales pero solo dispones de ${availH}h. El tiempo es insuficiente.`,
    tip:"Elimina una o dos materias para equilibrar la carga."
  };
  if (r >= 0.75) return {
    red:false, orange:false, yellow:true, green:false,
    label:"🟡 Margen Ajustado",
    bg:"#ca8a04", border:"#ca8a04", textColor:"white",
    badgeBg:"#fef9c3", badgeColor:"#713f12",
    msg:`La carga (${totalH}h) está cerca de tu límite (${availH}h). Viable, pero sin margen para imprevistos.`,
    tip:"Organiza un horario de estudio semanal desde el primer día."
  };
  return {
    red:false, orange:false, yellow:false, green:true,
    label:"🟢 Matrícula Adecuada",
    bg:"#16a34a", border:"#16a34a", textColor:"white",
    badgeBg:"#dcfce7", badgeColor:"#14532d",
    msg:`Tu disponibilidad (${availH}h) cubre con holgura la carga (${totalH}h). ¡Excelente elección!`,
    tip:"Aprovecha el tiempo extra para consolidar conocimientos."
  };
}

// ── HELPERS ───────────────────────────────────────────────────
function totalH() {
  return parseFloat([...ST.sel].reduce((t,id) => {
    const s = DB.find(x => x.id === id); return t + (s ? s.h : 0);
  }, 0).toFixed(1));
}

function filtered() {
  return DB.filter(s => s.e === ST.ens && s.m === ST.mod && s.n === ST.niv);
}

function byCategory(items) {
  return items.reduce((acc, s) => {
    if (!acc[s.c]) acc[s.c] = [];
    acc[s.c].push(s); return acc;
  }, {});
}

function semaforo(risk) {
  if (!risk) return `
    <div class="traffic-light">
      <div class="light"></div><div class="light"></div>
      <div class="light"></div><div class="light"></div>
    </div>`;
  return `
    <div class="traffic-light">
      <div class="light ${risk.red    ? 'on-red'    : ''}"></div>
      <div class="light ${risk.orange ? 'on-orange' : ''}"></div>
      <div class="light ${risk.yellow ? 'on-yellow' : ''}"></div>
      <div class="light ${risk.green  ? 'on-green'  : ''}"></div>
    </div>`;
}

function stepBar(current) {
  const steps = ["Perfil","Materias","Disponibilidad","Resultado"];
  return `<div style="display:flex;align-items:center;gap:8px;padding:10px 20px;background:white;border-bottom:1px solid #f1f5f9;">
    ${steps.map((s,i) => {
      const done   = i < current - 1;
      const active = i === current - 1;
      const dotBg  = (done || active) ? "#e25c1e" : "#f1f5f9";
      const dotClr = (done || active) ? "white" : "#94a3b8";
      const txtClr = (done || active) ? "#e25c1e" : "#cbd5e1";
      const lineBg = done ? "#fb923c" : "#f1f5f9";
      return `
        <div style="display:flex;align-items:center;gap:6px;color:${txtClr};">
          <div class="step-dot" style="background:${dotBg};color:${dotClr};">${done ? '✓' : i+1}</div>
          <span style="font-size:12px;font-weight:600;display:none;" class="sm-show">${s}</span>
        </div>
        ${i < 3 ? `<div class="step-line" style="background:${lineBg};"></div>` : ''}
      `;
    }).join('')}
  </div>`;
}

  const app = document.getElementById('app');
  app.innerHTML = `

    <div style="background:#0f172a;padding:20px 24px;display:flex;align-items:center;gap:16px;">

      </div>
    </div>
    ${stepBar(ST.step)}
    <div style="padding:24px 28px;" id="content" class="fade-in">

    <!-- PIE -->
    <div style="background:#f8fafc;padding:12px 24px;border-top:1px solid #e2e8f0;display:flex;align-items:center;gap:12px;">

    </div>
  `;
}

function renderStep() {
  if (ST.step === 1) return step1();
  if (ST.step === 2) return step2();
  if (ST.step === 3) return step3();
  if (ST.step === 4) return step4();
  return '';
}

      <div style="margin-bottom:20px;">
        <div style="font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;">¿Qué enseñanza deseas cursar?</div>

      ${ST.ens ? `

// ── PASO 2: MATERIAS ──────────────────────────────────────────
function step2() {
  const items = filtered();
  const th = totalH();
  const avail = ST.horas;
  const pct = avail > 0 ? Math.min((th / avail) * 100, 100) : 0;
  const barColor = pct >= 100 ? '#ef4444' : pct >= 75 ? '#f97316' : pct >= 50 ? '#eab308' : '#22c55e';
  const cats = byCategory(items);

  let materiasHtml = '';
  if (items.length === 0) {
    materiasHtml = `<div style="padding:32px;background:#fffbeb;border:1px solid #fde68a;border-radius:12px;text-align:center;color:#92400e;">

      <strong>Sin datos para esta combinación</strong>
      <p style="margin:6px 0 0;font-size:13px;">No hay estimaciones del profesorado para este perfil todavía.</p>
    </div>`;
  } else {
    for (const [cat, asigs] of Object.entries(cats)) {
      const cc = CAT_COLORS[cat] || {bg:'#f1f5f9',color:'#475569'};
      materiasHtml += `
        <div style="margin-bottom:20px;">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
            <span class="chip" style="background:${cc.bg};color:${cc.color};">${cat}</span>

            ${asigs.map(a => `
              <button class="subj-card ${ST.sel.has(a.id)?'checked':''}" onclick="toggleSel(${a.id})">

                  <input type="checkbox" ${ST.sel.has(a.id)?'checked':''} style="accent-color:#e25c1e;width:16px;height:16px;flex-shrink:0;" onclick="event.preventDefault()">
                  <span style="font-size:13px;font-weight:600;color:${ST.sel.has(a.id)?'#9a3412':'#334155'};">${a.nom}</span>
                </div>
                <span style="font-size:12px;font-weight:700;padding:4px 10px;border-radius:8px;background:${ST.sel.has(a.id)?'#fed7aa':'#f1f5f9'};color:${ST.sel.has(a.id)?'#9a3412':'#64748b'};flex-shrink:0;margin-left:8px;">${a.h}h</span>
              </button>`).join('')}
          </div>
        </div>`;
    }
  }

  return `
    <div>
      <button class="btn-back no-print" onclick="goTo(1)">← Volver</button>
      <h2 style="font-size:20px;font-weight:800;color:#1e293b;margin:12px 0 4px;">
        <span style="background:#fff7ed;color:#e25c1e;border-radius:50%;width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center;font-size:14px;margin-right:8px;">2</span>

        <strong>${ST.ens} · ${ST.niv} · ${ST.mod}</strong> — Las horas indican el estudio semanal estimado fuera del aula.
      </p>

      ${ST.sel.size > 0 ? `
      <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:14px;margin-bottom:16px;" class="fade-in">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
          <span style="font-size:12px;font-weight:600;color:#64748b;">Carga seleccionada</span>

        </div>
        <div class="load-track"><div class="load-fill" style="width:${pct}%;background:${barColor};"></div></div>
        <div style="display:flex;justify-content:space-between;font-size:11px;color:#94a3b8;margin-top:4px;">
          <span>${ST.sel.size} materia${ST.sel.size!==1?'s':''}</span>
          <span>${pct.toFixed(0)}% de tu disponibilidad actual (${avail}h)</span>
        </div>
      </div>` : ''}

      ${items.length > 0 ? `
      <div style="display:flex;justify-content:flex-end;gap:8px;margin-bottom:12px;">
        <button class="btn-secondary" style="font-size:12px;padding:6px 14px;" onclick="selAll()">Seleccionar todo</button>
        <button class="btn-secondary" style="font-size:12px;padding:6px 14px;" onclick="clearAll()">Limpiar</button>
      </div>` : ''}

  const th = totalH();
  const risk = getRisk(th, ST.horas);
  const pct = ST.horas > 0 ? Math.min((th / ST.horas) * 100, 100) : 0;
  const barColor = pct >= 100 ? '#ef4444' : pct >= 75 ? '#f97316' : pct >= 50 ? '#eab308' : '#22c55e';
  const msg = ST.horas <= 5  ? "⚠️ Tiempo muy limitado — sé muy selectivo con las materias" :
              ST.horas <= 10 ? "📚 Tiempo moderado — valora bien cuántas materias cursas" :
              ST.horas <= 20 ? "✅ Tiempo razonable — buena base para planificar" :
              ST.horas <= 30 ? "💪 Buena disponibilidad — podrás afrontar una carga amplia" :
                               "🚀 Alta disponibilidad — puedes plantearte una matrícula completa";

  const semRisk = risk ? `
    <div style="display:flex;align-items:center;gap:16px;margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.2);">
      ${semaforo(risk)}
      <div>
        <div style="font-weight:800;font-size:16px;margin-bottom:4px;">${risk.label}</div>
        <div style="font-size:12px;opacity:0.85;">${th}h requeridas · ${ST.horas}h disponibles · ${Math.min(Math.round((th/ST.horas)*100),999)}% ocupación</div>
      </div>
    </div>` : '';

  return `
    <div>
      <button class="btn-back no-print" onclick="goTo(2)">← Volver</button>
      <h2 style="font-size:20px;font-weight:800;color:#1e293b;margin:12px 0 4px;">
        <span style="background:#fff7ed;color:#e25c1e;border-radius:50%;width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center;font-size:14px;margin-right:8px;">3</span>
        ¿Cuánto tiempo puedes dedicar al estudio?
      </h2>
      <p style="color:#64748b;font-size:13px;margin:0 0 20px 40px;">Sé honesto. Horas semanales <strong>exclusivamente para estudiar</strong>, sin contar clases, trabajo ni familia.</p>

      <!-- Panel oscuro principal -->
      <div style="background:linear-gradient(135deg,#1e293b,#0f172a);border-radius:20px;padding:28px;margin-bottom:16px;">
        <div style="text-align:center;margin-bottom:20px;">
          <div style="font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;">Horas disponibles para estudiar</div>
          <div style="font-size:88px;font-weight:900;color:white;line-height:1;">
            ${ST.horas}<span style="font-size:28px;color:#64748b;font-weight:400;"> h/sem</span>
          </div>
          <div style="color:#94a3b8;font-size:13px;margin-top:8px;">${msg}</div>
        </div>

        <!-- Slider -->
        <div style="padding:0 8px;margin-bottom:16px;">
          <input type="range" min="2" max="40" step="1" value="${ST.horas}"
            oninput="setHoras(parseInt(this.value))">
          <div style="display:flex;justify-content:space-between;font-size:11px;color:#64748b;font-weight:600;margin-top:4px;">
            <span>2h</span><span>10h</span><span>20h</span><span>30h</span><span>40h</span>
          </div>
        </div>

        <!-- Botones rápidos -->
        <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;">
          ${[5,10,15,20,25,30].map(h => `
            <button onclick="setHoras(${h})" style="
              padding:6px 16px;border-radius:999px;font-size:13px;font-weight:700;cursor:pointer;border:none;
              background:${ST.horas===h?'#e25c1e':'#334155'};
              color:${ST.horas===h?'white':'#94a3b8'};
              transition:all 0.15s;
            ">${h}h</button>`).join('')}
        </div>

        <!-- Semáforo en tiempo real -->
        ${semRisk}
      </div>

      <!-- Leyenda -->
      <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:16px;margin-bottom:20px;">
        <div style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;">Referencia del semáforo</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
          ${[
            {dot:'#22c55e',label:'Adecuada',desc:'Menos del 75% de ocupación'},
            {dot:'#eab308',label:'Ajustada', desc:'Entre el 75% y el 100%'},
            {dot:'#f97316',label:'Riesgo alto',desc:'Carga supera disponibilidad'},
            {dot:'#ef4444',label:'Excesiva', desc:'Más de 35h absolutas'},
          ].map(x=>`
            <div style="display:flex;align-items:flex-start;gap:8px;">
              <div style="width:12px;height:12px;border-radius:50%;background:${x.dot};flex-shrink:0;margin-top:2px;"></div>
              <div>
                <div style="font-size:12px;font-weight:700;color:#334155;">${x.label}</div>
                <div style="font-size:11px;color:#94a3b8;">${x.desc}</div>
              </div>
            </div>`).join('')}
        </div>
      </div>

      <div style="display:flex;justify-content:flex-end;">
        <button class="btn-primary" style="font-size:17px;padding:14px 28px;" onclick="goTo(4)">
          Ver mi diagnóstico ⚡
        </button>
      </div>
    </div>`;
}

// ── PASO 4: RESULTADO ─────────────────────────────────────────
function step4() {
  const th = totalH();
  const risk = getRisk(th, ST.horas);
  if (!risk) return `<p>Sin datos</p>`;
  const pct = Math.min((th / ST.horas) * 100, 100);
  const barColor = pct >= 100 ? '#ef4444' : pct >= 75 ? '#f97316' : pct >= 50 ? '#eab308' : '#22c55e';
  const items = [...ST.sel].map(id => DB.find(x => x.id === id)).filter(Boolean);

  return `
    <div>
      <h2 style="font-size:20px;font-weight:800;color:#1e293b;text-align:center;margin:0 0 4px;">Informe de Matrícula</h2>
      <p style="text-align:center;color:#94a3b8;font-size:13px;margin:0 0 20px;">${ST.ens} · ${ST.niv} · ${ST.mod}</p>

      <!-- Bloque semáforo -->
      <div style="background:${risk.bg};border-radius:16px;padding:20px 24px;margin-bottom:20px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;">
        ${semaforo(risk)}
        <div style="flex:1;color:${risk.textColor};">
          <div style="font-size:22px;font-weight:900;margin-bottom:8px;">${risk.label}</div>
          <p style="margin:0;font-size:14px;opacity:0.9;line-height:1.5;">${risk.msg}</p>
          ${risk.tip ? `<div style="margin-top:10px;background:rgba(255,255,255,0.2);border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;">💡 ${risk.tip}</div>` : ''}
        </div>
      </div>

      <!-- Métricas -->
      <div class="grid-metrics" style="margin-bottom:16px;">
        <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:16px;text-align:center;">
          <div style="font-size:28px;font-weight:900;color:#1e293b;">${th}<span style="font-size:14px;font-weight:400;color:#94a3b8;"> h/sem</span></div>
          <div style="font-size:12px;font-weight:600;color:#64748b;margin-top:2px;">Carga estimada</div>
          <div style="font-size:11px;color:#94a3b8;">según el profesorado</div>
        </div>
        <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:16px;text-align:center;">
          <div style="font-size:28px;font-weight:900;color:#1e293b;">${ST.horas}<span style="font-size:14px;font-weight:400;color:#94a3b8;"> h/sem</span></div>
          <div style="font-size:12px;font-weight:600;color:#64748b;margin-top:2px;">Tu disponibilidad</div>
          <div style="font-size:11px;color:#94a3b8;">declarada por ti</div>
        </div>
      </div>

      <!-- Barra ratio -->
      <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:16px;margin-bottom:16px;">
        <div style="display:flex;justify-content:space-between;font-size:12px;font-weight:600;color:#64748b;margin-bottom:4px;">
          <span>Ratio de ocupación</span>
          <span>${Math.min(Math.round((th/ST.horas)*100),999)}%</span>
        </div>
        <div class="load-track"><div class="load-fill" style="width:${pct}%;background:${barColor};"></div></div>
      </div>

      <!-- Desglose materias -->
      <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;margin-bottom:20px;">
        <div style="padding:12px 16px;border-bottom:1px solid #e2e8f0;background:white;display:flex;justify-content:space-between;">
          <span style="font-weight:700;color:#334155;font-size:14px;">Materias seleccionadas (${items.length})</span>
          <span style="font-weight:800;color:#1e293b;font-size:14px;">Total: ${th} h</span>
        </div>
        <div class="scroll-y" style="max-height:220px;">
          ${items.map(s => {
            const cc = CAT_COLORS[s.c] || {bg:'#f1f5f9',color:'#475569'};
            return `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid #f1f5f9;">
              <div>
                <span style="font-size:13px;color:#334155;">${s.nom}</span>
                <span class="chip" style="background:${cc.bg};color:${cc.color};margin-left:8px;">${s.c}</span>
              </div>
              <span style="font-size:13px;font-weight:700;color:#475569;flex-shrink:0;margin-left:12px;">${s.h}h</span>
            </div>`;
          }).join('')}
        </div>
      </div>

      <!-- Acciones -->
      <div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;padding-top:16px;border-top:1px solid #f1f5f9;" class="no-print">
        <button class="btn-secondary" onclick="reset()">↺ Nueva evaluación</button>
        <button class="btn-secondary" onclick="goTo(2)">✎ Modificar materias</button>
        <button class="btn-secondary" style="background:#1e293b;color:white;border-color:#1e293b;" onclick="window.print()">🖨 Imprimir informe</button>
      </div>
    </div>`;
}

// ── ACCIONES ──────────────────────────────────────────────────
function setEns(v) { ST.ens=v; ST.mod=''; ST.niv=''; ST.sel=new Set(); render(); }
function setMod(v) { ST.mod=v; ST.niv=''; ST.sel=new Set(); render(); }
function setNiv(v) { ST.niv=v; render(); }
function toggleSel(id) { ST.sel.has(id)?ST.sel.delete(id):ST.sel.add(id); render(); }
function selAll() { filtered().forEach(s=>ST.sel.add(s.id)); render(); }
function clearAll() { ST.sel.clear(); render(); }
function setHoras(v) { ST.horas=v; render(); }
function goTo(s) { ST.step=s; render(); window.scrollTo({top:0,behavior:'smooth'}); }
function reset() { ST={step:1,ens:'',mod:'',niv:'',sel:new Set(),horas:15}; render(); window.scrollTo({top:0,behavior:'smooth'}); }

// ── ARRANQUE ──────────────────────────────────────────────────
render();

// ── REDIMENSIONADO AUTOMÁTICO PARA GOOGLE SITES (iframe) ──────
(function() {
  // Envía la altura actual del documento al padre (Google Sites)
  function sendHeight() {
    var h = document.documentElement.scrollHeight || document.body.scrollHeight;
    window.parent.postMessage({ type: 'setHeight', height: h }, '*');
  }

  // Observador de cambios en el DOM (se activa al re-renderizar pasos)
  if (window.ResizeObserver) {
    var ro = new ResizeObserver(sendHeight);
    ro.observe(document.body);
  } else {
    // Fallback para navegadores sin ResizeObserver
    setInterval(sendHeight, 500);
  }

  // También al cargar
  window.addEventListener('load', sendHeight);
  window.addEventListener('resize', sendHeight);
})();
</script>
</body>
</html>
